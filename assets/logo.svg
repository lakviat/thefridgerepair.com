    <rect x="7" y="7" width="68" height="78" rx="18" fill="url(#door)" />
    <line x1="7" y1="43" x2="75" y2="43" stroke="#17324d" stroke-width="4" stroke-linecap="round" />
    <rect x="55" y="18" width="6" height="16" rx="3" fill="#17324d" />

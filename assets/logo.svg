      <stop offset="0%" stop-color="#fff7d1" />
      <stop offset="100%" stop-color="#ffd84d" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8362" />
      <stop offset="100%" stop-color="#ffb06d" />
